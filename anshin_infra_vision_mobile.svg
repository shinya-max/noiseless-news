<svg role="img" viewBox="0 0 390 1480" width="100%" xmlns="http://www.w3.org/2000/svg"
     font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <title>安心インフラの全体ビジョン（モバイル版）</title>
  <desc>ノイズだらけの世界からシグナルだけを届ける、4つのサービスで構成された「安心インフラ」のコンセプト図。縦スクロール対応版。</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <rect width="390" height="1480" fill="#ffffff"/>

  <!-- ===== HEADER ===== -->
  <text x="195" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a1a">安心インフラ</text>
  <text x="195" y="70" text-anchor="middle" font-size="13" fill="#444">ノイズだらけの世界に、シグナルだけを届ける</text>

  <!-- ===== MECHANISM: NOISE → FILTER → SIGNAL (縦積み) ===== -->

  <!-- NOISE -->
  <text x="195" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#555" letter-spacing="2">NOISE</text>
  <rect x="20" y="108" width="350" height="128" rx="12" fill="#f6f4ef" stroke="#e8e4dc"/>
  <text x="55"  y="136" font-size="13" fill="#555" transform="rotate(-4 55 136)">詐欺電話</text>
  <text x="175" y="128" font-size="14" fill="#555" transform="rotate( 3 175 128)">煽り見出し</text>
  <text x="285" y="133" font-size="12" fill="#666" transform="rotate(-2 285 133)">芸能スキャンダル</text>
  <text x="36"  y="162" font-size="14" fill="#444" transform="rotate(-2 36 162)">SNS通知</text>
  <text x="155" y="159" font-size="12" fill="#666" transform="rotate( 4 155 159)">情報商材</text>
  <text x="268" y="165" font-size="13" fill="#555" transform="rotate(-3 268 165)">過剰CM</text>
  <text x="48"  y="210" font-size="12" fill="#666" transform="rotate( 2 48 210)">高齢者狙い商法</text>
  <text x="185" y="216" font-size="12" fill="#666" transform="rotate(-2 185 216)">価値観の揺らぎ</text>
  <text x="292" y="210" font-size="12" fill="#555" transform="rotate( 2 292 210)">買い替え不安</text>

  <!-- Arrow ↓ -->
  <line x1="195" y1="236" x2="195" y2="262" stroke="#777" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FILTER funnel -->
  <text x="195" y="281" text-anchor="middle" font-size="13" font-weight="600" fill="#c96442" letter-spacing="2">FILTER</text>
  <path d="M 28,290 L 362,290 L 252,370 Q 195,384 138,370 Z" fill="#faf9f5" stroke="#c96442" stroke-width="1.5"/>
  <text x="195" y="320" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">4つのサービス</text>
  <text x="195" y="340" text-anchor="middle" font-size="12" fill="#444">外側のノイズを削ぐ × 3</text>
  <text x="195" y="357" text-anchor="middle" font-size="12" fill="#444">内側のシグナルを掘る × 1</text>
  <text x="195" y="380" text-anchor="middle" font-size="12" fill="#555">ACT が中核</text>

  <!-- Arrow ↓ -->
  <line x1="195" y1="396" x2="195" y2="422" stroke="#777" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SIGNAL -->
  <text x="195" y="440" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a" letter-spacing="2">SIGNAL → 安心</text>
  <rect x="20" y="450" width="350" height="160" rx="12" fill="#faf9f5" stroke="#c96442"/>
  <text x="195" y="479" text-anchor="middle" font-size="13" fill="#1a1a1a">今日大切にしたいこと</text>
  <text x="195" y="501" text-anchor="middle" font-size="13" fill="#1a1a1a">世界の本質と備え</text>
  <text x="195" y="523" text-anchor="middle" font-size="13" fill="#1a1a1a">必要な家電・必要な機能だけ</text>
  <text x="195" y="545" text-anchor="middle" font-size="13" fill="#1a1a1a">守られている、というベース</text>
  <text x="195" y="567" text-anchor="middle" font-size="13" fill="#1a1a1a">自分の価値観に立ち返る時間</text>
  <text x="195" y="592" text-anchor="middle" font-size="12" fill="#555">= 静けさ・余白・主体性</text>

  <!-- ===== 4 PILLARS (2×2グリッド) ===== -->
  <text x="20" y="638" font-size="13" font-weight="600" fill="#555" letter-spacing="2">4 PILLARS</text>
  <line x1="20" y1="647" x2="370" y2="647" stroke="#e8e4dc"/>

  <!-- Card 1: ノイズレス・ニュース (MVP) 左上 -->
  <g transform="translate(15, 659)">
    <rect width="170" height="166" rx="12" fill="#faf9f5" stroke="#c96442" stroke-width="2"/>
    <rect x="0" y="0" width="170" height="24" rx="12" fill="#c96442"/>
    <rect x="0" y="12" width="170" height="12" fill="#c96442"/>
    <text x="85" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="0.5">★ MVP / 今ここ</text>
    <text x="85" y="50" text-anchor="middle" font-size="22">📰</text>
    <text x="85" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">ノイズレス</text>
    <text x="85" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">ニュース</text>
    <text x="85" y="116" text-anchor="middle" font-size="11" fill="#444">世界・日本・地域</text>
    <text x="85" y="132" text-anchor="middle" font-size="11" fill="#444">事実 × 裏側 × 備え</text>
    <text x="85" y="152" text-anchor="middle" font-size="11" fill="#555">煽り・スキャンダル排除</text>
  </g>

  <!-- Card 2: ACTジャーナリング (CORE) 右上 -->
  <g transform="translate(205, 659)">
    <rect width="170" height="166" rx="12" fill="#f6f4ef" stroke="#666" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="0" y="0" width="170" height="24" rx="12" fill="#2c2c2c"/>
    <rect x="0" y="12" width="170" height="12" fill="#2c2c2c"/>
    <text x="85" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="0.5">◆ CORE / 中核</text>
    <text x="85" y="50" text-anchor="middle" font-size="22">🧭</text>
    <text x="85" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">ACT</text>
    <text x="85" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">ジャーナリング</text>
    <text x="85" y="116" text-anchor="middle" font-size="11" fill="#444">価値観の棚卸し</text>
    <text x="85" y="132" text-anchor="middle" font-size="11" fill="#444">朝の意図 × 夜の振り返り</text>
    <text x="85" y="152" text-anchor="middle" font-size="11" fill="#555">内的羅針盤</text>
  </g>

  <!-- Card 3: 投資・詐欺の盾 左下 -->
  <g transform="translate(15, 839)">
    <rect width="170" height="166" rx="12" fill="#faf9f5" stroke="#ccc" stroke-width="1"/>
    <text x="85" y="50" text-anchor="middle" font-size="22">🛡️</text>
    <text x="85" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">投資・詐欺の盾</text>
    <text x="85" y="102" text-anchor="middle" font-size="11" fill="#444">「これ、変かも?」</text>
    <text x="85" y="118" text-anchor="middle" font-size="11" fill="#444">をいつでも相談</text>
    <text x="85" y="134" text-anchor="middle" font-size="11" fill="#444">違和感が、最初の一歩</text>
    <text x="85" y="153" text-anchor="middle" font-size="11" fill="#555">弁護士・FPへ繋ぐ</text>
  </g>

  <!-- Card 4: 暮らしのソムリエ 右下 -->
  <g transform="translate(205, 839)">
    <rect width="170" height="166" rx="12" fill="#faf9f5" stroke="#ccc" stroke-width="1"/>
    <text x="85" y="50" text-anchor="middle" font-size="22">🏠</text>
    <text x="85" y="78" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a1a">暮らしのソムリエ</text>
    <text x="85" y="102" text-anchor="middle" font-size="11" fill="#444">選ぶ・直す・管理する</text>
    <text x="85" y="118" text-anchor="middle" font-size="11" fill="#444">AI → ギグワーカー</text>
    <text x="85" y="134" text-anchor="middle" font-size="11" fill="#444">→ 修理屋 / 福祉</text>
    <text x="85" y="153" text-anchor="middle" font-size="11" fill="#555">福祉の入り口にもなる</text>
  </g>

  <!-- ===== EXPANSION PATH (縦積み) ===== -->
  <text x="20" y="1032" font-size="13" font-weight="600" fill="#555" letter-spacing="2">EXPANSION PATH</text>
  <text x="20" y="1050" font-size="12" fill="#666">誰の安心を獲りに行くか</text>
  <line x1="20" y1="1058" x2="370" y2="1058" stroke="#e8e4dc"/>

  <!-- START -->
  <rect x="25" y="1068" width="340" height="66" rx="10" fill="#faf9f5" stroke="#c96442" stroke-width="2"/>
  <text x="195" y="1088" text-anchor="middle" font-size="11" font-weight="700" fill="#c96442" letter-spacing="1">START / 今ここ</text>
  <text x="195" y="1109" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">自分と同じ感覚の人</text>
  <text x="195" y="1126" text-anchor="middle" font-size="11" fill="#555">情報疲れ・主体性回復志向</text>
  <line x1="195" y1="1134" x2="195" y2="1148" stroke="#777" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- NEXT -->
  <rect x="25" y="1152" width="340" height="66" rx="10" fill="#f6f4ef" stroke="#ccc"/>
  <text x="195" y="1172" text-anchor="middle" font-size="11" font-weight="600" fill="#555" letter-spacing="1">NEXT</text>
  <text x="195" y="1193" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">情報疲れ層 30〜50代</text>
  <text x="195" y="1210" text-anchor="middle" font-size="11" fill="#555">SaaS的に直販</text>
  <line x1="195" y1="1218" x2="195" y2="1232" stroke="#777" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- EXPAND -->
  <rect x="25" y="1236" width="340" height="66" rx="10" fill="#f6f4ef" stroke="#ccc"/>
  <text x="195" y="1256" text-anchor="middle" font-size="11" font-weight="600" fill="#555" letter-spacing="1">EXPAND</text>
  <text x="195" y="1277" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">AI難民・親世代</text>
  <text x="195" y="1294" text-anchor="middle" font-size="11" fill="#555">家族2世代UI</text>
  <line x1="195" y1="1302" x2="195" y2="1316" stroke="#777" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- VISION -->
  <rect x="25" y="1320" width="340" height="66" rx="10" fill="#f6f4ef" stroke="#ccc"/>
  <text x="195" y="1340" text-anchor="middle" font-size="11" font-weight="600" fill="#555" letter-spacing="1">VISION</text>
  <text x="195" y="1361" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a1a">高齢者単身 × 福祉接続</text>
  <text x="195" y="1378" text-anchor="middle" font-size="11" fill="#555">公的セクターと連携</text>

  <!-- ===== PRINCIPLE ===== -->
  <line x1="20" y1="1408" x2="370" y2="1408" stroke="#e8e4dc"/>
  <text x="20" y="1428" font-size="12" font-weight="600" fill="#555" letter-spacing="2">PRINCIPLE</text>
  <text x="20" y="1447" font-size="12" fill="#333">情報を増やす側ではなく、減らす側に立つ。</text>
  <text x="20" y="1463" font-size="12" fill="#333">外側のノイズを削ぎ、内側のシグナルを掘り起こす。</text>
  <text x="20" y="1475" font-size="11" fill="#333">これが「安心」の正体。4本柱を貫くコア。</text>
</svg>
