<svg role="img" viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif">
  <title>安心インフラの全体ビジョン</title>
  <desc>ノイズだらけの世界からシグナルだけを届ける、4つのサービスで構成された「安心インフラ」のコンセプト図。MVPはノイズレス・ニュース、中核はACTジャーナリング、ターゲットは自分と同じ感覚の人から始めて高齢者層まで広げる。</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#999"/>
    </marker>
  </defs>

  <rect width="900" height="760" fill="#ffffff"/>

  <!-- HEADER -->
  <text x="450" y="36" text-anchor="middle" font-size="24" font-weight="700" fill="#1a1a1a">安心インフラ</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#666">ノイズだらけの世界に、シグナルだけを届ける</text>

  <!-- MECHANISM ROW -->
  <g transform="translate(40, 100)">
    <text x="110" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#888" letter-spacing="2">NOISE</text>
    <rect x="0" y="22" width="220" height="160" rx="12" fill="#f6f4ef" stroke="#e8e4dc"/>
    <text x="22" y="50" font-size="12" fill="#777" transform="rotate(-6 22 50)">詐欺電話</text>
    <text x="120" y="46" font-size="13" fill="#777" transform="rotate(4 120 46)">煽り見出し</text>
    <text x="30" y="78" font-size="11" fill="#999" transform="rotate(3 30 78)">芸能スキャンダル</text>
    <text x="135" y="80" font-size="14" fill="#666" transform="rotate(-3 135 80)">SNS通知</text>
    <text x="20" y="112" font-size="13" fill="#777" transform="rotate(-2 20 112)">過剰CM</text>
    <text x="115" y="115" font-size="11" fill="#999" transform="rotate(5 115 115)">情報商材</text>
    <text x="40" y="142" font-size="12" fill="#777" transform="rotate(-4 40 142)">高齢者狙い商法</text>
    <text x="150" y="145" font-size="11" fill="#999" transform="rotate(2 150 145)">買い替え不安</text>
    <text x="35" y="170" font-size="11" fill="#999" transform="rotate(-1 35 170)">価値観の揺らぎ</text>
  </g>

  <line x1="270" y1="200" x2="338" y2="200" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <g transform="translate(340, 100)">
    <text x="110" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#c96442" letter-spacing="2">FILTER</text>
    <path d="M 10 28 Q 110 28 210 28 L 175 110 Q 110 130 45 110 Z" fill="#faf9f5" stroke="#c96442" stroke-width="1.5"/>
    <text x="110" y="60" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">4つのサービス</text>
    <text x="110" y="82" text-anchor="middle" font-size="11" fill="#666">外側のノイズを削ぐ × 3</text>
    <text x="110" y="100" text-anchor="middle" font-size="11" fill="#666">内側のシグナルを掘る × 1</text>
    <rect x="95" y="130" width="30" height="18" fill="#faf9f5" stroke="#c96442" stroke-width="1.5"/>
    <text x="110" y="172" text-anchor="middle" font-size="11" fill="#888">ACT が中核</text>
  </g>

  <line x1="582" y1="200" x2="650" y2="200" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

  <g transform="translate(640, 100)">
    <text x="110" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#1a1a1a" letter-spacing="2">SIGNAL → 安心</text>
    <rect x="0" y="22" width="220" height="160" rx="12" fill="#faf9f5" stroke="#c96442"/>
    <text x="110" y="52" text-anchor="middle" font-size="13" fill="#1a1a1a">今日大切にしたいこと</text>
    <text x="110" y="76" text-anchor="middle" font-size="13" fill="#1a1a1a">世界の本質と備え</text>
    <text x="110" y="100" text-anchor="middle" font-size="13" fill="#1a1a1a">必要な家電・必要な機能だけ</text>
    <text x="110" y="124" text-anchor="middle" font-size="13" fill="#1a1a1a">守られている、というベース</text>
    <text x="110" y="148" text-anchor="middle" font-size="13" fill="#1a1a1a">自分の価値観に立ち返る時間</text>
    <text x="110" y="172" text-anchor="middle" font-size="11" fill="#888">= 静けさ・余白・主体性</text>
  </g>

  <!-- SERVICE CARDS -->
  <text x="40" y="320" font-size="11" font-weight="600" fill="#888" letter-spacing="2">4 PILLARS</text>
  <line x1="40" y1="328" x2="860" y2="328" stroke="#e8e4dc"/>

  <g transform="translate(40, 348)">
    <rect width="195" height="160" rx="12" fill="#faf9f5" stroke="#c96442" stroke-width="2"/>
    <rect x="0" y="0" width="195" height="22" rx="12" fill="#c96442"/>
    <rect x="0" y="11" width="195" height="11" fill="#c96442"/>
    <text x="97.5" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="1">★ MVP / 今ここ</text>
    <text x="97.5" y="50" text-anchor="middle" font-size="22">📰</text>
    <text x="97.5" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">ノイズレス・ニュース</text>
    <text x="97.5" y="100" text-anchor="middle" font-size="11" fill="#666">世界・日本・地域</text>
    <text x="97.5" y="118" text-anchor="middle" font-size="11" fill="#666">裏側 × 備えるべき心構え</text>
    <text x="97.5" y="140" text-anchor="middle" font-size="10" fill="#888">スキャンダル・煽りを排除</text>
  </g>

  <g transform="translate(245, 348)">
    <rect width="195" height="160" rx="12" fill="#f6f4ef" stroke="#888" stroke-width="1.5" stroke-dasharray="4 3"/>
    <rect x="0" y="0" width="195" height="22" rx="12" fill="#2c2c2c"/>
    <rect x="0" y="11" width="195" height="11" fill="#2c2c2c"/>
    <text x="97.5" y="16" text-anchor="middle" font-size="11" font-weight="700" fill="#fff" letter-spacing="1">◆ CORE / 中核</text>
    <text x="97.5" y="50" text-anchor="middle" font-size="22">🧭</text>
    <text x="97.5" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">ACTジャーナリング</text>
    <text x="97.5" y="100" text-anchor="middle" font-size="11" fill="#666">価値観の棚卸し</text>
    <text x="97.5" y="118" text-anchor="middle" font-size="11" fill="#666">朝の意図 × 夜の振り返り</text>
    <text x="97.5" y="140" text-anchor="middle" font-size="10" fill="#888">他3つを駆動する内的羅針盤</text>
  </g>

  <g transform="translate(450, 348)">
    <rect width="195" height="160" rx="12" fill="#faf9f5" stroke="#e8e4dc" stroke-width="1"/>
    <text x="97.5" y="50" text-anchor="middle" font-size="22">🛡️</text>
    <text x="97.5" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">投資・詐欺の盾</text>
    <text x="97.5" y="100" text-anchor="middle" font-size="11" fill="#666">「これ、変かも?」をいつでも</text>
    <text x="97.5" y="118" text-anchor="middle" font-size="11" fill="#666">違和感を、最初に相談する窓口</text>
    <text x="97.5" y="140" text-anchor="middle" font-size="10" fill="#888">必要なら弁護士・FPへ繋ぐ</text>
  </g>

  <g transform="translate(655, 348)">
    <rect width="195" height="160" rx="12" fill="#faf9f5" stroke="#e8e4dc" stroke-width="1"/>
    <text x="97.5" y="50" text-anchor="middle" font-size="22">🏠</text>
    <text x="97.5" y="78" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">暮らしのソムリエ</text>
    <text x="97.5" y="100" text-anchor="middle" font-size="11" fill="#666">選ぶ・直す・管理する</text>
    <text x="97.5" y="118" text-anchor="middle" font-size="11" fill="#666">AI → ギグワーカー → 修理屋</text>
    <text x="97.5" y="140" text-anchor="middle" font-size="10" fill="#888">福祉の入り口にもなる</text>
  </g>

  <!-- USER EXPANSION -->
  <text x="40" y="555" font-size="11" font-weight="600" fill="#888" letter-spacing="2">EXPANSION PATH / 誰の安心を獲りに行くか</text>
  <line x1="40" y1="563" x2="860" y2="563" stroke="#e8e4dc"/>

  <g transform="translate(40, 580)">
    <rect x="0" y="0" width="180" height="68" rx="10" fill="#faf9f5" stroke="#c96442" stroke-width="2"/>
    <text x="90" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#c96442" letter-spacing="1">START / 今ここ</text>
    <text x="90" y="44" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">自分と同じ感覚の人</text>
    <text x="90" y="60" text-anchor="middle" font-size="10" fill="#888">情報疲れ・主体性回復志向</text>

    <line x1="190" y1="34" x2="218" y2="34" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="220" y="0" width="180" height="68" rx="10" fill="#f6f4ef" stroke="#e8e4dc"/>
    <text x="310" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#888" letter-spacing="1">NEXT</text>
    <text x="310" y="44" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">情報疲れ層 30〜50代</text>
    <text x="310" y="60" text-anchor="middle" font-size="10" fill="#888">SaaS的に直販</text>

    <line x1="410" y1="34" x2="438" y2="34" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="440" y="0" width="180" height="68" rx="10" fill="#f6f4ef" stroke="#e8e4dc"/>
    <text x="530" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#888" letter-spacing="1">EXPAND</text>
    <text x="530" y="44" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">AI難民・親世代</text>
    <text x="530" y="60" text-anchor="middle" font-size="10" fill="#888">家族2世代UI</text>

    <line x1="630" y1="34" x2="658" y2="34" stroke="#999" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="660" y="0" width="180" height="68" rx="10" fill="#f6f4ef" stroke="#e8e4dc"/>
    <text x="750" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#888" letter-spacing="1">VISION</text>
    <text x="750" y="44" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">高齢者単身 × 福祉接続</text>
    <text x="750" y="60" text-anchor="middle" font-size="10" fill="#888">公的セクターと連携</text>
  </g>

  <!-- FOOTER -->
  <line x1="40" y1="680" x2="860" y2="680" stroke="#e8e4dc"/>
  <text x="40" y="704" font-size="11" font-weight="600" fill="#888" letter-spacing="2">PRINCIPLE</text>
  <text x="40" y="726" font-size="12" fill="#555">情報を増やす側ではなく、減らす側に立つ。 — 外側のノイズを削ぎ、内側のシグナル(価値観)を掘り起こす。</text>
  <text x="40" y="746" font-size="12" fill="#555">これが「安心」の正体であり、領域(ニュース・投資・家電・心)を超えて一貫させるコア。</text>
</svg>